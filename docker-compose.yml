version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: nocodb-plugin-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-nocodb-datasource
    volumes:
      - ./dist:/var/lib/grafana/plugins/grafana-nocodb-datasource
      - grafana-storage:/var/lib/grafana
    networks:
      - nocodb-network

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb-plugin-nocodb
    ports:
      - '8080:8080'
    environment:
      - NC_DB=sqlite3://data/nc.db
      - NC_AUTH_JWT_SECRET=your-secret-key-change-in-production
    volumes:
      - nocodb-data:/usr/app/data
    networks:
      - nocodb-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: nocodb-plugin-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=nocodb
      - POSTGRES_USER=nocodb
      - POSTGRES_PASSWORD=nocodb_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nocodb-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nocodb']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  grafana-storage:
  nocodb-data:
  postgres-data:

networks:
  nocodb-network:
    driver: bridge
